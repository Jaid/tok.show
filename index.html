<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>(()=>{const e=document.documentElement,h=e.hasAttribute('data-dark'),l=e.hasAttribute('data-light');if(h!==l){e.style.colorScheme=h?'dark':'light';return}const d=matchMedia('(prefers-color-scheme:dark)').matches;e.toggleAttribute('data-dark',d);e.toggleAttribute('data-light',!d);e.style.colorScheme=d?'dark':'light'})()</script>
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <title>Tok·Show</title>
</head>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
